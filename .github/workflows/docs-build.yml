# Compila o site Docusaurus em docs-src/ em cada alteração relevante.
# Não substitui preview local opcional (npm run start); o build oficial é no CI.

name: Docs (Docusaurus)

on:
  push:
    branches: [main, master]
    paths:
      - 'docs-src/**'
      - '.github/workflows/docs-build.yml'
  pull_request:
    paths:
      - 'docs-src/**'
      - '.github/workflows/docs-build.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: npm run build
