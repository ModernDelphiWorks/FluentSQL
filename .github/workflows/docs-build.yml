# Valida o build do Docusaurus em docs-src/ em pull requests (sem gravar docs/).
# O build oficial e o commit em docs/ ficam a cargo de deploy-docs.yml no push.

name: Docs (Docusaurus)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'docs-src/**'
      - '.github/workflows/docs-build.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: npm run build
